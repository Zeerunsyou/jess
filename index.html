<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Video Wall</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: #0c0c0c;
  color: white;
  font-family: Arial, sans-serif;
}

/* Login overlay */
#lock {
  position: fixed;
  inset: 0;
  background: #0c0c0c;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.lock-box {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

.lock-box input,
.lock-box button {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  margin-top: 12px;
  border-radius: 6px;
  border: none;
  outline: none;
  font-size: 15px;
}

.lock-box button {
  cursor: pointer;
  font-weight: bold;
}

#error {
  color: #ff6b6b;
  margin-top: 10px;
  font-size: 14px;
  display: none;
}

header {
  text-align: center;
  padding: 20px;
}

.grid {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.card {
  background: transparent;
  border-radius: 12px;
  overflow: hidden;
}

video {
  width: 100%;
  display: block;
  background: black;
}
</style>
</head>
<body>

<!-- Password screen -->
<div id="lock">
  <div class="lock-box">
    <h2>Enter password</h2>
    <input type="password" id="pw" placeholder="Password">
    <button onclick="unlock()">Unlock</button>
    <div id="error">Wrong password</div>
  </div>
</div>

<div id="site" style="display:none">

<header>
  <h1>My Videos</h1>
</header>

<div class="grid" id="grid"></div>

</div>

<script>
/* -------------------------
   CHANGE YOUR PASSWORD HERE
-------------------------- */
const PASSWORD = "mommyjessissohot44";

/* keep unlocked during tab session */
if (sessionStorage.getItem("unlocked") === "yes") {
  showSite();
}

function unlock() {
  const input = document.getElementById("pw").value;

  if (input === PASSWORD) {
    sessionStorage.setItem("unlocked", "yes");
    showSite();
  } else {
    document.getElementById("error").style.display = "block";
  }
}

function showSite() {
  document.getElementById("lock").style.display = "none";
  document.getElementById("site").style.display = "block";
}

/* build videos */
const grid = document.getElementById("grid");

for (let i = 1; i <= 21; i++) {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <video controls preload="metadata">
      <source src="${i}.mp4" type="video/mp4">
    </video>
  `;

  grid.appendChild(card);
}
</script>

</body>
</html>
